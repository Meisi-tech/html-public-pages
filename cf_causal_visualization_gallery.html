<style>
.gallery{padding:.5rem 0}
.seg{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.seg-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:.5px solid var(--border-strong);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.seg-btn.on{background:var(--bg-accent);color:var(--text-accent);border-color:var(--border-accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.card{background:var(--surface-1);border:.5px solid var(--border);border-radius:12px;overflow:hidden}
.card-preview{background:var(--surface-2);border-bottom:.5px solid var(--border);padding:16px 20px;min-height:160px;display:flex;align-items:center;justify-content:center}
.card-body{padding:14px 16px}
.card-tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;margin-bottom:6px}
.tag-cf{background:#FAECE7;color:#712B13}
.tag-causal{background:#EAF3DE;color:#27500A}
.card-name{font-size:14px;font-weight:500;color:var(--text-primary);margin:0 0 4px}
.card-desc{font-size:12px;color:var(--text-secondary);line-height:1.6;margin:0 0 8px}
.card-use{font-size:11px;color:var(--text-muted);border-top:.5px solid var(--border);padding-top:8px;margin-top:4px}
.card-use span{color:var(--text-accent)}
svg.preview{width:100%;max-height:140px}
</style>

<div class="gallery">
<div class="seg" id="seg"></div>
<div class="grid" id="grid"></div>

}

function renderGrid(){
  const items=cur==='全部'?cards:cards.filter(c=>c.cat===cur);
  document.getElementById('grid').innerHTML=items.map(c=>`
    <div class="card">
      <div class="card-preview">${c.preview}</div>
      <div class="card-body">
        <span class="card-tag ${c.cat==='反事实解释'?'tag-cf':'tag-causal'}">${c.cat}</span>
        <div class="card-name">${c.name}</div>
        <div class="card-desc">${c.desc}</div>
        <div class="card-use">推荐场景：<span>${c.use}</span></div>
      </div>
    </div>
  `).join('');
}

function setcat(c){cur=c;renderSeg();renderGrid();}
