<style>
.wrap{padding:0.5rem 0}
.toc{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem}
.toc-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border-strong);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.toc-btn.active{background:var(--bg-accent);color:var(--text-accent);border-color:var(--border-accent)}
.fig-card{background:var(--surface-1);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.fig-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.fig-badge{flex-shrink:0;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px}
.badge-fig{background:#E6F1FB;color:#0C447C}
.badge-tab{background:#EAF3DE;color:#27500A}
.badge-sup{background:#F1EFE8;color:#444441}
.fig-title{font-size:15px;font-weight:500;color:var(--text-primary);margin:0}
.fig-subtitle{font-size:12px;color:var(--text-muted);margin:2px 0 0}
.fig-body{font-size:13px;color:var(--text-secondary);line-height:1.7;margin:0 0 12px}
.subfig-list{display:flex;flex-direction:column;gap:8px}
.subfig{background:var(--surface-2);border-left:3px solid var(--border-accent);border-radius:0;padding:8px 12px}
.subfig-label{font-size:12px;font-weight:500;color:var(--text-accent);margin-bottom:3px}
.subfig-desc{font-size:12px;color:var(--text-secondary);line-height:1.6;margin:0}
.key-box{background:var(--bg-success);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text-success);margin-top:10px}
.hidden{display:none}
.section-label{font-size:11px;font-weight:500;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase;margin:1.5rem 0 0.5rem;padding-bottom:4px;border-bottom:0.5px solid var(--border)}
</style>

<div class="wrap">
<div class="toc" id="toc"></div>
<div id="content"></div>
</div>

<script>
const data = [
  {
    id:'fig1', badge:'fig', label:'Figure 1', type:'正文图',

    subfigs:[

      {label:'缩写图例', desc:'图下方列出所有缩写含义：ML、ROC、SHAP、PDP、DiCE、PR curve、DML，帮助读者快速对照理解'}
    ],

      {label:'Fig 3e — 亚组判别性能（AUROC森林图样式）', desc:'按年龄(<40岁 vs ≥40岁)和性别(男 vs 女)分层展示AUROC，最低仍达0.927，虚线代表整体AUROC均值。证明模型不只在整体上好，对老年男性这类"难预测"亚组也同样有效。'},
      {label:'Fig 3f — 亚组校准性能（O/E比值森林图）', desc:'O/E比（观测/预期）反映各亚组的校准性，值越接近1越好，整体O/E=1.16（95% CI: 0.97–1.40），置信区间跨越1.0说明无统计显著偏差。图中各亚组均无显著预测偏差，证明模型公平性。'}
    ],
    key:'6个子图形成完整的"铁三角"证据：判别好（ROC/PR）+ 有临床价值（DCA）+ 预测准确（校准）+ 各人群公平（亚组），缺一不可。'
  },
  {
    id:'fig4', badge:'fig', label:'Figure 4', type:'正文图',
    title:'最终模型的时间外部验证',
    subtitle:'Temporal validation · 四个子图',
    body:'地理验证证明模型跨地点有效，时间验证证明模型跨时间有效（未来的新患者也适用）。两种验证都通过才是真正的强模型。',
    subfigs:[

      {label:'Fig 4c — 决策曲线分析（时间验证集）', desc:'在时间验证集上重复DCA，结论与Fig 3c一致：模型净获益优于全治或全不治策略，临床价值在新时间段依然成立。'},
      {label:'Fig 4d — 亚组气泡图', desc:'X轴是AUROC，Y轴是不同亚组（年龄×性别组合），气泡大小=样本量，颜色深浅=预测准确率（越浅越高），气泡内数字=样本量。一张图同时传达了四维信息，所有亚组AUROC均>0.9、准确率>0.8，说明时间迁移后模型在各类患者中都稳定有效。'}
    ],
    key:'时间验证是很多临床ML论文的短板，本文专门设了独立验证队列并用4个子图全面展示，是质量高于普通论文的重要体现。'

  {

      {label:'Fig 5b — SHAP交互热图（特征交互效应）', desc:'矩阵热图，颜色越深代表两个变量之间的交互效应越强。对角线是各变量自身的主效应，颅骨缺损面积、GCS、手术时长三者自交互最强，说明这三个变量不仅独立影响结局，彼此之间还有协同作用（例如手术时间长+缺损面积大→风险叠加放大）。'},

      {label:'Fig 5d — DiCE反事实解释雷达图', desc:'雷达图展示两个反事实方案（CF1和CF2），每个轴是一个特征，实线=原始患者，虚线=反事实患者。通过对比轴上数值的差异，直观显示"只需改变负压引流使用/手术材料其中之一，就能把预测从高风险翻转为低风险"，提供可执行的临床干预建议。'},
      {label:'Fig 5e — ATE柱状图（双重机器学习结果）', desc:'两根柱子分别代表负压引流（ATE=−0.241）和钛网（ATE=−0.191）的平均处理效应，柱子上方显示95%置信区间。两个置信区间均不跨越0，说明因果效应在统计上显著，不是偶然发现。这是从"预测相关"升级到"因果证据"的关键结果。'},

    ],
    key:'6个子图层层递进：SHAP解释相关性 → PDP展示非线性 → DiCE给出干预方案 → DML验证因果 → CATE识别个体差异，构成完整的从关联到因果的证据链。'
  },
  {
    id:'tab1', badge:'tab', label:'Table 1', type:'正文表',
    title:'三个队列的患者基线临床特征',
    subtitle:'Clinical baseline characteristics · 论文必备基线表',
    body:'临床ML论文的"标配表"，证明三个队列的患者构成是否可比，也说明了数据质量。',
    subfigs:[
      {label:'内容结构', desc:'行=各临床变量（年龄、性别、GCS、手术时长、材料选择、并发症率等），列=三个队列（建模队列/地理验证/时间验证），最后一列是P值（检验三组间差异是否显著）'},
      {label:'核心作用一：可比性验证', desc:'若三队列基线特征基本相似（P>0.05），说明外部验证集与建模集人群相似，模型外推是合理的；若有差异，则需讨论是否影响泛化'},

    ],
    key:'这张表没有高深技术，但它是论文可信度的基石——数据不透明的ML论文很难在顶刊发表。'
  },
  {
    id:'sup', badge:'sup', label:'补充图表 (Figs S1–S16)', type:'补充材料',
    title:'补充材料核心内容速览',

    body:'正文篇幅有限，大量细节放在补充材料中。以下是其中几个关键补充图的意义。',

      {label:'Figs S11–S12 — SHAP个体解释图', desc:'包括force plot（力图）、decision plot（决策图）、waterfall plot（瀑布图），针对具体患者案例展示SHAP如何逐步从基础值出发，叠加每个变量的贡献，最终给出预测，是个体化解释的直觉呈现'},
      {label:'Fig S13 — 1D偏依赖图（PDP）', desc:'正文Fig 5c展示了3D PDP，这里展示各变量的1D PDP曲线，例如手术时长PDP曲线在4小时后陡升，DC-CP间隔PDP呈U形，是发现临床阈值的重要工具'},
      {label:'Figs S14–S16 — Web工具界面截图和通用平台', desc:'S14展示了8个预测模块的Web界面，S15展示具体输入输出页面，S16是他们做的通用手术并发症预测平台（可推广到其他术种），这三张图体现了研究的临床转化和方法推广价值'}
    ],
    key:'补充材料不是"垃圾桶"，顶刊论文的补充图往往比正文还丰富，反映了团队的真实工作量和严谨程度。'
  }
];

const cats = [
  {key:'all', label:'全部'},
  {key:'fig', label:'正文图 (Fig 1–5)'},
  {key:'tab', label:'正文表 (Table 1)'},
  {key:'sup', label:'补充材料'}
];

let active = 'all';

function renderToc(){
  document.getElementById('toc').innerHTML = cats.map(c=>
    `<button class="toc-btn${active===c.key?' active':''}" onclick="filter('${c.key}')">${c.label}</button>`
  ).join('');
}

function renderContent(){
  const items = active==='all' ? data : data.filter(d=>d.badge===active);
  document.getElementById('content').innerHTML = items.map(d=>`
    <div class="fig-card">
      <div class="fig-header">
        <span class="fig-badge badge-${d.badge}">${d.label}</span>
        <div>
          <div class="fig-title">${d.title}</div>
          <div class="fig-subtitle">${d.subtitle}</div>
        </div>
      </div>
      <p class="fig-body">${d.body}</p>
      <div class="subfig-list">
        ${d.subfigs.map(s=>`
          <div class="subfig">
            <div class="subfig-label">${s.label}</div>
            <p class="subfig-desc">${s.desc}</p>
          </div>
        `).join('')}
      </div>
      ${d.key?`<div class="key-box">核心价值：${d.key}</div>`:''}
    </div>
  `).join('');
}

function filter(key){
  active = key;
  renderToc();
  renderContent();
}

renderToc();
renderContent();
</script>
