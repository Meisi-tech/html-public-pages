<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICU耐药预测模型 · 分析流程线路图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&family=Noto+Sans+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F6F3; --surface:#FFFFFF; --ink:#1B2733; --ink-soft:#57626C;
    --line:#DCE1E0; --teal:#1F6F63; --clay:#AF4238; --amber:#C6872B; --navy:#22385C;
    --station-r:15;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans SC',sans-serif;}
  header{padding:48px 6vw 28px;border-bottom:1px solid var(--line);}
  header .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;color:var(--clay);text-transform:uppercase;}
  header h1{font-family:'Noto Serif SC',serif;font-weight:900;font-size:clamp(26px,3.4vw,42px);margin:10px 0 10px;line-height:1.25;}
  header p{color:var(--ink-soft);max-width:640px;line-height:1.7;font-size:15px;margin:0;}
  .wrap{padding:8px 6vw 80px;display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,1fr);gap:36px;align-items:start;}
  @media (max-width:920px){.wrap{grid-template-columns:1fr;}}
  .track-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px 8px 8px;position:sticky;top:20px;}
  @media (max-width:920px){.track-card{position:static;}}
  svg{width:100%;height:auto;display:block;}
  .station{cursor:pointer;}
  .station circle{fill:var(--surface);stroke:var(--navy);stroke-width:3;transition:all .25s ease;}
  .station text.num{font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:11px;fill:var(--navy);transition:fill .25s;}
  .station .lbl{font-family:'Noto Sans SC',sans-serif;font-size:12.5px;fill:var(--ink-soft);}
  .station.active circle{fill:var(--navy);stroke:var(--navy);}
  .station.active text.num{fill:#fff;}
  .station.active .lbl{fill:var(--ink);font-weight:700;}
  .station:hover circle{stroke:var(--clay);}
  .rail{stroke:var(--line);stroke-width:6;}
  .rail-progress{stroke:var(--navy);stroke-width:6;transition:stroke-dasharray .3s;}
  .stage-band{fill:none;}
  .stage-tag{font-family:'IBM Plex Mono',monospace;font-size:10.5px;fill:var(--ink-soft);letter-spacing:.06em;}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:30px 32px;min-height:420px;}
  .panel .step-tag{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--clay);letter-spacing:.1em;text-transform:uppercase;}
  .panel h2{font-family:'Noto Serif SC',serif;font-weight:700;font-size:24px;margin:8px 0 4px;}
  .panel .sub{color:var(--ink-soft);font-size:14px;margin-bottom:20px;}
  .kv{display:grid;grid-template-columns:88px 1fr;gap:6px 14px;font-size:14px;line-height:1.7;margin-bottom:10px;}
  .kv b{color:var(--navy);font-weight:700;}
  .box{background:#F0F2EE;border-left:3px solid var(--teal);border-radius:8px;padding:12px 16px;margin-top:16px;font-size:13.5px;line-height:1.75;color:var(--ink);}
  .box.warn{border-left-color:var(--clay);}
  .box .box-title{font-weight:700;color:var(--teal);margin-bottom:4px;font-size:13px;}
  .box.warn .box-title{color:var(--clay);}
  .nav-btns{display:flex;gap:10px;margin-top:24px;}
  .nav-btns button{flex:1;padding:11px;border-radius:10px;border:1px solid var(--line);background:#fff;font-family:'Noto Sans SC',sans-serif;font-size:13.5px;cursor:pointer;color:var(--ink);transition:all .15s;}
  .nav-btns button:hover{border-color:var(--navy);color:var(--navy);}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:14px 8px 6px;font-size:11.5px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
</style>
</head>
<body>
<header>
  <div class="eyebrow">Clinical Prediction Model · Pipeline Map</div>
  <h1>从401例ICU病历，到一张耐药风险计算器<br>——分析流程线路图</h1>
  <p>把 Step 0 到 Step 12 想象成一条地铁线路：数据从起点出发，经过一站站的"加工"，最终到达终点——一套可以在临床上使用的预测工具。点击任意一站，右侧会展示这一站在做什么、为什么需要它。</p>
</header>

<div class="wrap">
  <div class="track-card">
    <div class="legend">
      <span><i class="dot" style="background:#22385C"></i>数据准备</span>
      <span><i class="dot" style="background:#1F6F63"></i>变量筛选与建模</span>
      <span><i class="dot" style="background:#AF4238"></i>性能评估与解释</span>
    </div>
    <svg id="rail-svg" viewBox="0 0 640 900"></svg>
  </div>
  <div class="panel" id="panel">
    <div class="step-tag">点击左侧任意一站</div>
    <h2>开始探索流程</h2>
    <div class="sub">共13站，从数据读取到SHAP解释</div>
    <div class="box"><div class="box-title">提示</div>用鼠标点击线路图上的圆点，或使用下方"上一站/下一站"按钮，逐站了解整个分析流程。</div>
  </div>
</div>

<script>
const steps = [
 {n:0,cat:0,title:"包管理",tag:"STEP 0 · 准备",desc:"自动检测并安装分析要用到的R软件包；LightGBM是可选项，没装也不影响主流程。",why:"就像装修前先把工具箱配齐——保证后面每一步都能顺利跑起来，缺个别非必需工具不影响整体施工。",input:"—",output:"完整可运行的分析环境"},
 {n:1,cat:0,title:"全局设置",tag:"STEP 1 · 准备",desc:"设定随机种子(set.seed)、创建输出文件夹、定义统一的配色和绘图风格。",why:"随机种子保证结果可重复：别人用同样代码、同样种子，能得到完全一样的结果，这是科研可信度的基本要求。",input:"—",output:"固定的随机种子 + 统一图表风格"},
 {n:2,cat:0,title:"数据读取",tag:"STEP 2 · 准备",desc:"读取401例患者数据，校验结局列(outcome)和分组列(set)，自动生成 0/1 数值结局和文字标签。",why:"确保数据格式规范、没有缺失或错误标签，是所有后续分析的地基。",input:"原始CSV数据",output:"结构化的患者数据表"},
 {n:3,cat:0,title:"变量类型识别",tag:"STEP 3 · 准备",desc:"自动区分35个特征里哪些是连续变量(如年龄)、哪些是分类变量(如感染部位)，并按预设列划分训练集/验证集。",why:"变量类型决定了后面该用哪种统计检验方法；训练集/验证集的划分让模型验证有意义。",input:"结构化数据",output:"连续/分类变量清单 + 训练/验证分组"},
 {n:4,cat:1,title:"基线特征表 Table 1/2",tag:"STEP 4 · 筛选建模",desc:"Table1比较训练集与验证集是否均衡；Table2比较耐药组与非耐药组的初步差异。",why:"Table1确认两组数据'考卷难度一致'；Table2为后续变量筛选提供第一批候选线索。",input:"训练/验证分组数据",output:"两张基线特征对比表"},
 {n:5,cat:1,title:"LASSO变量筛选 Figure 1",tag:"STEP 5 · 筛选建模",desc:"用cv.glmnet对35个变量做10折交叉验证，自动挑出预测力最强的一批变量。",why:"临床上不可能同时看35个指标，LASSO像一场海选，自动淘汰冗余、保留关键变量。",input:"35个候选特征",output:"精简后的核心变量子集"},
 {n:6,cat:1,title:"多因素回归+列线图",tag:"STEP 6 · 筛选建模",desc:"对LASSO选出的变量做多因素Logistic回归(Table4)，并生成可手算的列线图(Figure2)。",why:"给每个变量算出精确的风险倍数(OR)，再转化成医生查房时能直接用的'纸质计算器'。",input:"LASSO筛选后的变量",output:"OR值表 + 列线图"},
 {n:7,cat:1,title:"七模型训练",tag:"STEP 7 · 筛选建模",desc:"同时训练LR/KNN/RF/DT/NN/XGB/LGB七种模型，用交叉验证和网格搜索寻找最佳参数。",why:"不同模型各有优劣，同台竞技才能选出真正适合这份数据、适合临床使用的模型。",input:"训练集数据",output:"7个训练好的预测模型"},
 {n:8,cat:2,title:"性能评估 Table 5",tag:"STEP 8 · 评估解释",desc:"计算每个模型的AUC(DeLong 95%CI)、灵敏度、特异度、PPV、NPV、F1，按验证集AUC选出最优模型。",why:"这是七个模型的'期末成绩单'，决定最终推荐哪一个模型进入临床场景。",input:"7个模型 + 验证集",output:"模型性能对比总表"},
 {n:9,cat:2,title:"ROC曲线 Figure 3",tag:"STEP 9 · 评估解释",desc:"分别在训练集/验证集画出ROC曲线，直观展示各模型的区分能力。",why:"把AUC这个数字变成一眼能看懂的曲线，越靠左上角说明模型区分耐药/非耐药的能力越强。",input:"模型预测概率",output:"训练集/验证集ROC曲线图"},
 {n:10,cat:2,title:"校准曲线 Figure 4",tag:"STEP 10 · 评估解释",desc:"用LOESS平滑法检验模型预测的概率数字是否与实际发生比例吻合。",why:"AUC高只说明排序对，校准曲线检验模型说的'70%风险'是不是真的准。",input:"模型预测概率",output:"预测概率 vs 实际发生率对比图"},
 {n:11,cat:2,title:"决策曲线DCA Figure 5",tag:"STEP 11 · 评估解释",desc:"在0~45%阈值范围内，比较各模型相较'全治疗/全不治疗'策略的临床净获益。",why:"回答终极问题：这个模型用在临床决策里，真的能让患者获益吗？",input:"模型预测概率 + 阈值范围",output:"净获益曲线图"},
 {n:12,cat:2,title:"SHAP解释 Figure 6",tag:"STEP 12 · 评估解释",desc:"用SHAP方法拆解每个变量对预测结果的具体贡献，包括整体重要性、变量方向、非线性关系和个体化解释。",why:"打开机器学习的'黑箱'，让医生知道模型判断的依据，提升临床可信度。",input:"最优模型 + 患者数据",output:"变量重要性/患者个体化解释图"}
];
const catColor = ["#22385C","#1F6F63","#AF4238"];
const svg = document.getElementById('rail-svg');
const NS = "http://www.w3.org/2000/svg";
const x0=60, x1=60, yTop=40, yBot=860, n=steps.length;
const ys = steps.map((s,i)=> yTop + i*(yBot-yTop)/(n-1));

function el(tag,attrs){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

// rail background
svg.appendChild(el('line',{x1:x0,y1:yTop,x2:x1,y2:yBot,class:'rail'}));
const progress = el('line',{x1:x0,y1:yTop,x2:x1,y2:yTop,class:'rail-progress'});
svg.appendChild(progress);

steps.forEach((s,i)=>{
  const g = el('g',{class:'station',id:'st'+i});
  const cy = ys[i];
  const c = el('circle',{cx:x0,cy:cy,r:15});
  const num = el('text',{class:'num',x:x0,y:cy+4,'text-anchor':'middle'}); num.textContent=s.n;
  const lbl = el('text',{class:'lbl',x:x0+28,y:cy+5}); lbl.textContent = s.title;
  const catmark = el('circle',{cx:x0,cy:cy,r:15,fill:'none',stroke:catColor[s.cat],'stroke-width':2,opacity:0.55});
  g.appendChild(c); g.appendChild(catmark); g.appendChild(num); g.appendChild(lbl);
  g.addEventListener('click',()=>select(i));
  svg.appendChild(g);
});

let current = -1;
function select(i){
  current = i;
  document.querySelectorAll('.station').forEach((el,idx)=>{
    el.classList.toggle('active', idx===i);
  });
  progress.setAttribute('y2', ys[i]);
  const s = steps[i];
  document.getElementById('panel').innerHTML = `
    <div class="step-tag">${s.tag}</div>
    <h2>${s.title}</h2>
    <div class="sub">流程第 ${s.n} 步 / 共12步</div>
    <div class="kv"><b>做什么</b><span>${s.desc}</span></div>
    <div class="kv"><b>输入</b><span>${s.input}</span></div>
    <div class="kv"><b>产出</b><span>${s.output}</span></div>
    <div class="box"><div class="box-title">为什么需要这一步</div>${s.why}</div>
    <div class="nav-btns">
      <button ${i===0?'disabled style="opacity:.4;cursor:default;"':''} onclick="select(${i-1})">← 上一站</button>
      <button ${i===steps.length-1?'disabled style="opacity:.4;cursor:default;"':''} onclick="select(${i+1})">下一站 →</button>
    </div>
  `;
}
select(0);
</script>
</body>
</html>
