<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table 1 / Table 2 · 基线特征对比表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F6F3;--surface:#fff;--ink:#1B2733;--soft:#57626C;--line:#DCE1E0;--teal:#1F6F63;--clay:#AF4238;--amber:#C6872B;--navy:#22385C;}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans SC',sans-serif;}
header{padding:40px 6vw 20px;border-bottom:1px solid var(--line);}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--clay);letter-spacing:.14em;text-transform:uppercase;}
h1{font-family:'Noto Serif SC',serif;font-weight:900;font-size:clamp(24px,3vw,36px);margin:8px 0;}
header p{color:var(--soft);max-width:680px;line-height:1.7;font-size:14.5px;}
.tabs{display:flex;gap:10px;margin:22px 6vw 0;}
.tab{padding:10px 18px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:14px;font-weight:500;color:var(--soft);}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.wrap{padding:24px 6vw 70px;display:grid;grid-template-columns:1.5fr 1fr;gap:28px;align-items:start;}
@media (max-width:960px){.wrap{grid-template-columns:1fr;}}
table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;font-size:13.5px;}
thead th{text-align:left;padding:12px 14px;background:#EEF1EC;font-weight:700;color:var(--navy);border-bottom:1px solid var(--line);}
tbody td{padding:11px 14px;border-bottom:1px solid var(--line);}
tbody tr{cursor:pointer;transition:background .15s;}
tbody tr:hover{background:#F5F7F3;}
tbody tr.active{background:#EAF1EE;}
.pval{font-family:'IBM Plex Mono',monospace;}
.pval.sig{color:var(--clay);font-weight:700;}
.bar-cell{width:130px;}
.bar-track{height:8px;background:#E7EBE6;border-radius:4px;position:relative;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:26px 28px;position:sticky;top:20px;min-height:340px;}
.panel .k{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--clay);text-transform:uppercase;letter-spacing:.08em;}
.panel h2{font-family:'Noto Serif SC',serif;margin:8px 0 12px;font-size:21px;}
.panel .row{display:flex;justify-content:space-between;font-size:14px;padding:7px 0;border-bottom:1px dashed var(--line);}
.panel .row b{color:var(--navy);}
.box{background:#F0F2EE;border-left:3px solid var(--teal);border-radius:8px;padding:12px 15px;margin-top:16px;font-size:13.5px;line-height:1.7;}
.box.warn{border-left-color:var(--clay);background:#FBF1EF;}
.box .t{font-weight:700;color:var(--teal);margin-bottom:4px;}
.box.warn .t{color:var(--clay);}
.legend{display:flex;gap:18px;margin:14px 6vw 0;font-size:12px;color:var(--soft);font-family:'IBM Plex Mono',monospace;}
.legend span{display:inline-flex;align-items:center;gap:6px;}
.dot{width:9px;height:9px;border-radius:50%;}
</style>
</head>
<body>
<header>
  <div class="eyebrow">Table 1 &amp; Table 2 · Baseline Characteristics</div>
  <h1>基线特征对比表 —— 两组人到底有什么不一样</h1>
  <p>点击下方切换按钮，对比"训练集 vs 验证集"（检验分组是否公平）或"耐药组 vs 非耐药组"（寻找耐药风险的初步线索）。点击任意一行，右侧会解释这个变量、这个P值意味着什么。以下数值为<b>示意性模拟数据</b>，非真实研究结果。</p>
</header>
<div class="tabs">
  <div class="tab active" id="tab-set" onclick="switchTab('set')">Table 1 · 训练集 vs 验证集</div>
  <div class="tab" id="tab-outcome" onclick="switchTab('outcome')">Table 2 · 耐药 vs 非耐药</div>
</div>
<div class="legend" id="legend"></div>
<div class="wrap">
  <table>
    <thead><tr id="thead-row"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="panel" id="panel">
    <div class="k">点击左侧任意一行</div>
    <h2>选择一个变量</h2>
    <div class="box"><div class="t">怎么用这张表</div>先看最右边的P值：大于0.05说明两组没有显著差异；小于0.05说明存在真实差异，值得关注。</div>
  </div>
</div>

<script>
const dataSets = {
  set: {
    colA:'训练集 (n=281)', colB:'验证集 (n=120)',
    dotA:'var(--navy)', dotB:'#8CA0B8',
    vars:[
      {name:'年龄 (岁)', type:'连续', a:'62.4 ± 13.1', b:'63.8 ± 12.6', av:62.4, bv:63.8, p:0.412, sig:false,
        interp:'年龄在两组间分布相似，均值相差不到1.5岁，属于正常波动范围。', test:'两独立样本t检验（数据近似正态分布）'},
      {name:'性别 (男, %)', type:'分类', a:'168 (59.8%)', b:'70 (58.3%)', av:59.8, bv:58.3, p:0.781, sig:false,
        interp:'男性比例在两组间几乎一致，不存在性别分布不均的问题。', test:'卡方检验'},
      {name:'病情严重度评分 acuity_score', type:'连续', a:'18.7 ± 5.9', b:'19.1 ± 6.2', av:18.7, bv:19.1, p:0.523, sig:false,
        interp:'反映患者入院时整体病情严重程度的评分，两组接近，说明病情基线可比。', test:'两独立样本t检验'},
      {name:'既往住院天数 (天)', type:'连续', a:'9.2 ± 6.5', b:'11.8 ± 7.9', av:9.2, bv:11.8, p:0.038, sig:true,
        interp:'验证集患者既往住院天数略长于训练集，P<0.05提示存在统计学差异，解读结果时需留意这一点，但整体差异幅度不算极端。', test:'Wilcoxon秩和检验（数据非正态分布）'},
      {name:'糖尿病 (有, %)', type:'分类', a:'74 (26.3%)', b:'35 (29.2%)', av:26.3, bv:29.2, p:0.556, sig:false,
        interp:'糖尿病患病比例接近，不构成两组间的混杂差异。', test:'卡方检验'},
      {name:'既往广谱抗生素使用 (是, %)', type:'分类', a:'96 (34.2%)', b:'46 (38.3%)', av:34.2, bv:38.3, p:0.436, sig:false,
        interp:'两组既往用药暴露比例相近，说明分组没有系统性偏差。', test:'卡方检验'},
      {name:'血标本来源 (Blood_culture, %)', type:'分类', a:'89 (31.7%)', b:'34 (28.3%)', av:31.7, bv:28.3, p:0.499, sig:false,
        interp:'感染标本来源分布均衡。', test:'卡方检验'}
    ]
  },
  outcome: {
    colA:'非耐药组 (n=196)', colB:'耐药组 (n=85)',
    dotA:'var(--teal)', dotB:'var(--clay)',
    vars:[
      {name:'年龄 (岁)', type:'连续', a:'59.8 ± 12.4', b:'68.3 ± 13.5', av:59.8, bv:68.3, p:0.001, sig:true,
        interp:'耐药组患者年龄明显偏大，提示年龄可能是耐药的危险因素之一，值得纳入后续多因素分析。', test:'两独立样本t检验'},
      {name:'病情严重度评分 acuity_score', type:'连续', a:'16.9 ± 5.2', b:'22.6 ± 6.4', av:16.9, bv:22.6, p:0.001, sig:true,
        interp:'病情越重的患者，感染耐药菌的比例越高，符合临床常识（重症患者更多暴露于广谱抗生素和侵入性操作）。', test:'两独立样本t检验'},
      {name:'既往住院天数 (天)', type:'连续', a:'7.5 ± 5.1', b:'14.9 ± 8.2', av:7.5, bv:14.9, p:0.001, sig:true,
        interp:'住院时间越长，暴露在医院环境（尤其是耐药菌定植风险）中的时间也越长，这是经典的耐药危险因素。', test:'Wilcoxon秩和检验'},
      {name:'既往广谱抗生素使用 (是, %)', type:'分类', a:'46 (23.5%)', b:'52 (61.2%)', av:23.5, bv:61.2, p:0.001, sig:true,
        interp:'耐药组既往使用广谱抗生素的比例是非耐药组的两倍多，是最直观、也最符合微生物学原理的危险因素。', test:'卡方检验'},
      {name:'机械通气 (是, %)', type:'分类', a:'88 (44.9%)', b:'61 (71.8%)', av:44.9, bv:71.8, p:0.002, sig:true,
        interp:'机械通气意味着更多侵入性操作和更长的ICU暴露时间，与耐药风险显著相关。', test:'卡方检验'},
      {name:'糖尿病 (有, %)', type:'分类', a:'48 (24.5%)', b:'26 (30.6%)', av:24.5, bv:30.6, p:0.298, sig:false,
        interp:'两组糖尿病比例差异未达统计学意义，提示糖尿病本身在本次单因素分析中不是突出的区分因素。', test:'卡方检验'},
      {name:'性别 (男, %)', type:'分类', a:'115 (58.7%)', b:'50 (58.8%)', av:58.7, bv:58.8, p:0.986, sig:false,
        interp:'性别在两组间几乎没有差异。', test:'卡方检验'}
    ]
  }
};
let currentTab='set';
function switchTab(t){
  currentTab=t;
  document.getElementById('tab-set').classList.toggle('active', t==='set');
  document.getElementById('tab-outcome').classList.toggle('active', t==='outcome');
  render();
}
function render(){
  const d = dataSets[currentTab];
  document.getElementById('legend').innerHTML = `
    <span><i class="dot" style="background:${d.dotA.replace('var(--navy)','#22385C').replace('var(--teal)','#1F6F63')}"></i>${d.colA}</span>
    <span><i class="dot" style="background:${d.dotB.replace('var(--navy)','#8CA0B8').replace('var(--clay)','#AF4238')}"></i>${d.colB}</span>
  `;
  document.getElementById('thead-row').innerHTML = `<th>变量</th><th>${d.colA}</th><th>${d.colB}</th><th>组间差异</th><th>P值</th>`;
  const tbody = document.getElementById('tbody');
  tbody.innerHTML='';
  d.vars.forEach((v,i)=>{
    const max = Math.max(v.av,v.bv)*1.15;
    const wA = (v.av/max*100).toFixed(0), wB=(v.bv/max*100).toFixed(0);
    const colA = currentTab==='set'? '#22385C':'#1F6F63';
    const colB = currentTab==='set'? '#8CA0B8':'#AF4238';
    const tr=document.createElement('tr');
    tr.innerHTML = `<td><b>${v.name}</b><br><span style="color:#93A09A;font-size:11.5px;">${v.type}</span></td>
      <td>${v.a}</td><td>${v.b}</td>
      <td class="bar-cell"><div class="bar-track"><div class="bar-fill" style="width:${wA}%;background:${colA};position:absolute;top:0;left:0;height:4px;"></div><div class="bar-fill" style="width:${wB}%;background:${colB};position:absolute;top:4px;left:0;height:4px;"></div></div></td>
      <td class="pval ${v.sig?'sig':''}">${v.p<0.001?'<0.001':v.p.toFixed(3)}${v.sig?' *':''}</td>`;
    tr.onclick=()=>selectRow(i,tr);
    tbody.appendChild(tr);
  });
}
function selectRow(i,tr){
  document.querySelectorAll('tbody tr').forEach(t=>t.classList.remove('active'));
  tr.classList.add('active');
  const v = dataSets[currentTab].vars[i];
  document.getElementById('panel').innerHTML = `
    <div class="k">${v.type}变量</div>
    <h2>${v.name}</h2>
    <div class="row"><span>检验方法</span><b>${v.test}</b></div>
    <div class="row"><span>P值</span><b class="${v.sig?'':''}" style="color:${v.sig?'#AF4238':'#1F6F63'}">${v.p<0.001?'<0.001':v.p.toFixed(3)}</b></div>
    <div class="row"><span>是否显著</span><b>${v.sig?'是（P<0.05）':'否（P≥0.05）'}</b></div>
    <div class="box ${v.sig?'warn':''}"><div class="t">怎么解读</div>${v.interp}</div>
  `;
}
switchTab('set');
</script>
</body>
</html>
