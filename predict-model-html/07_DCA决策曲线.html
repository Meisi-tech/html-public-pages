<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 5 · 决策曲线分析 DCA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F6F3;--surface:#fff;--ink:#1B2733;--soft:#57626C;--line:#DCE1E0;--teal:#1F6F63;--clay:#AF4238;--amber:#C6872B;--navy:#22385C;}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans SC',sans-serif;}
header{padding:40px 6vw 18px;border-bottom:1px solid var(--line);}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--clay);letter-spacing:.14em;text-transform:uppercase;}
h1{font-family:'Noto Serif SC',serif;font-weight:900;font-size:clamp(24px,3vw,36px);margin:8px 0;}
header p{color:var(--soft);max-width:720px;line-height:1.7;font-size:14.5px;}
.wrap{padding:26px 6vw 70px;display:grid;grid-template-columns:1.3fr 1fr;gap:28px;align-items:start;}
@media (max-width:980px){.wrap{grid-template-columns:1fr;}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px 24px;}
svg{width:100%;height:auto;}
.legend{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--soft);margin-bottom:10px;font-family:'IBM Plex Mono',monospace;}
.legend span{display:inline-flex;align-items:center;gap:6px;}
.dot{width:10px;height:3px;display:inline-block;}
input[type=range]{width:100%;accent-color:var(--clay);margin-top:10px;}
.panel{position:sticky;top:20px;padding:24px 26px;}
.panel h2{font-family:'Noto Serif SC',serif;font-size:20px;margin:6px 0 12px;}
.k{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--clay);text-transform:uppercase;letter-spacing:.08em;}
.stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--line);font-size:14px;}
.stat b{font-family:'IBM Plex Mono',monospace;}
.box{background:#F0F2EE;border-left:3px solid var(--teal);border-radius:8px;padding:12px 15px;margin-top:14px;font-size:13.5px;line-height:1.7;}
.box .t{font-weight:700;color:var(--teal);margin-bottom:4px;}
</style>
</head>
<body>
<header>
  <div class="eyebrow">Figure 5 · Decision Curve Analysis</div>
  <h1>决策曲线分析 DCA —— 这个模型用了，真的划算吗</h1>
  <p>拖动滑块设定"医生打算在多少风险以上就采取干预"的阈值(0~45%)，观察不同模型的"净获益"曲线，以及和"全部治疗/全部不治疗"两种极端策略相比，谁的曲线位置最高。以下为<b>示意性模拟数据</b>（人群耐药患病率按30%估算）。</p>
</header>
<div class="wrap">
  <div class="card">
    <div class="legend" id="legend"></div>
    <svg id="dcaSvg" viewBox="0 0 460 400"></svg>
    <input type="range" id="slider" min="0" max="45" value="15">
    <div style="display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--soft);margin-top:4px;"><span>0%（几乎人人治疗）</span><span id="ptLabel">当前阈值：15%</span><span>45%（非常保守）</span></div>
  </div>
  <div class="card panel" id="panel"></div>
</div>
<script>
const prevalence = 0.30;
const models = {
  LR:{name:'Logistic回归', color:'#22385C', sensMid:0.20, sensSteep:0.09, specMid:0.15, specSteep:0.10},
  RF:{name:'随机森林', color:'#1F6F63', sensMid:0.18, sensSteep:0.08, specMid:0.17, specSteep:0.09},
  XGB:{name:'XGBoost', color:'#AF4238', sensMid:0.23, sensSteep:0.10, specMid:0.13, specSteep:0.11}
};
function sigDown(pt,mid,steep){return 1/(1+Math.exp((pt-mid)/steep));}
function sigUp(pt,mid,steep){return 1/(1+Math.exp(-(pt-mid)/steep));}
function sensAt(m,pt){return Math.min(0.98,Math.max(0.03,sigDown(pt,m.sensMid,m.sensSteep)));}
function specAt(m,pt){return Math.min(0.98,Math.max(0.03,sigUp(pt,m.specMid,m.specSteep)));}
function netBenefit(sens,spec,pt){
  const odds = pt/(1-pt);
  return sens*prevalence - (1-spec)*(1-prevalence)*odds;
}
function treatAllNB(pt){ const odds=pt/(1-pt); return prevalence - (1-prevalence)*odds; }

const NS="http://www.w3.org/2000/svg";
function el(tag,attrs){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}
const S=400,pad=46,plotW=460-pad*1.5,plotH=S-pad*1.5;
function px(pt){return pad+(pt/45)*plotW;}
function py(nb){ const ymin=-0.05, ymax=0.32; return pad+(ymax-nb)/(ymax-ymin)*plotH; }

function draw(){
  const svg=document.getElementById('dcaSvg');
  svg.innerHTML='';
  svg.setAttribute('viewBox','0 0 460 '+S);
  svg.appendChild(el('rect',{x:pad,y:py(0.32),width:plotW,height:plotH,fill:'none',stroke:'#DCE1E0'}));
  svg.appendChild(el('line',{x1:px(0),y1:py(0),x2:px(45),y2:py(0),stroke:'#C7CDC9','stroke-width':1.3}));
  for(let t=0;t<=45;t+=15){
    const tx=el('text',{x:px(t),y:py(-0.05)+16,'font-size':10,fill:'#93A09A','text-anchor':'middle'});tx.textContent=t+'%';svg.appendChild(tx);
  }
  [0,0.1,0.2,0.3].forEach(v=>{
    const ty=el('text',{x:pad-8,y:py(v)+3,'font-size':10,fill:'#93A09A','text-anchor':'end'});ty.textContent=v.toFixed(2);svg.appendChild(ty);
  });
  const xl=el('text',{x:px(22.5),y:S-4,'font-size':11.5,fill:'#57626C','text-anchor':'middle'});xl.textContent='阈值概率 (阈值 %)';svg.appendChild(xl);

  // treat-none
  let dn=''; for(let i=0;i<=45;i++){dn+=(i===0?'M':'L')+px(i)+','+py(0)+' ';}
  svg.appendChild(el('path',{d:dn,fill:'none',stroke:'#B7BDB6','stroke-width':1.8,'stroke-dasharray':'2,3'}));
  // treat-all
  let da=''; for(let i=0;i<=45;i++){const pt=i/100; da+=(i===0?'M':'L')+px(i)+','+py(treatAllNB(pt))+' ';}
  svg.appendChild(el('path',{d:da,fill:'none',stroke:'#8B9490','stroke-width':1.8}));

  Object.values(models).forEach(m=>{
    let d='';
    for(let i=0;i<=45;i++){
      const pt=i/100;
      const nb=netBenefit(sensAt(m,pt),specAt(m,pt),pt);
      d+=(i===0?'M':'L')+px(i)+','+py(nb)+' ';
    }
    svg.appendChild(el('path',{d:d,fill:'none',stroke:m.color,'stroke-width':2.4}));
  });
  const curPt=+document.getElementById('slider').value;
  svg.appendChild(el('line',{x1:px(curPt),y1:pad*0.4,x2:px(curPt),y2:S-pad*0.7,stroke:'#C6872B','stroke-width':1.4,'stroke-dasharray':'4,3'}));
}
document.getElementById('legend').innerHTML = `
  <span><i class="dot" style="background:#B7BDB6"></i>全部不治疗</span>
  <span><i class="dot" style="background:#8B9490"></i>全部治疗</span>
  ${Object.values(models).map(m=>`<span><i class="dot" style="background:${m.color}"></i>${m.name}</span>`).join('')}
`;

function updatePanel(){
  const pt=+document.getElementById('slider').value;
  document.getElementById('ptLabel').textContent='当前阈值：'+pt+'%';
  const ptFrac=pt/100;
  const rows = Object.entries(models).map(([k,m])=>({name:m.name,nb:netBenefit(sensAt(m,ptFrac),specAt(m,ptFrac),ptFrac),color:m.color}));
  rows.push({name:'全部治疗',nb:treatAllNB(ptFrac),color:'#8B9490'});
  rows.push({name:'全部不治疗',nb:0,color:'#B7BDB6'});
  rows.sort((a,b)=>b.nb-a.nb);
  const best = rows[0];
  document.getElementById('panel').innerHTML = `
    <div class="k">阈值 = ${pt}%</div>
    <h2>净获益排名</h2>
    ${rows.map((r,i)=>`<div class="stat"><span style="color:${i===0?r.color:'inherit'};font-weight:${i===0?700:400}">${i===0?'★ ':''}${r.name}</span><b style="color:${r.color}">${r.nb.toFixed(3)}</b></div>`).join('')}
    <div class="box"><div class="t">解读</div>在这个阈值下，<b>${best.name}</b>的净获益最高。净获益可以理解为"每100位患者中，用这个策略相当于净多识别出多少例真正需要干预的耐药患者，同时已经扣除了误判带来的代价"。数值越高越好，且要高于"全部治疗"和"全部不治疗"这两条基准线，模型才算真正有临床价值。</div>
  `;
}
document.getElementById('slider').addEventListener('input', ()=>{draw();updatePanel();});
draw();
updatePanel();
</script>
</body>
</html>
